<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <section id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
            <img src="github-logo.png" alt="Logo" class="w-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800">Sign In</h1>
            <p class="text-gray-500 mb-6">Enter your credentials to access the tracker</p>
            
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Username" class="w-full p-3 border rounded focus:outline-blue-500">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded focus:outline-blue-500">
                <button id="login-btn" class="w-full bg-black text-white py-3 rounded font-semibold hover:bg-gray-800 transition">Sign In</button>
            </div>

            <div class="mt-6 p-3 bg-gray-100 rounded text-sm text-left">
                <p><strong>Demo Credential:</strong></p>
                <p>User: admin | Pass: admin123</p>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="bg-white border-b p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="github-logo.png" alt="Logo" class="w-8">
                <span class="font-bold text-xl">IssueTracker</span>
            </div>
            <div class="flex w-full md:w-auto gap-2">
                <input id="search-input" type="text" placeholder="Search issues..." class="border p-2 rounded w-full md:w-64">
                <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Search</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="bg-white border rounded-t-lg p-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex gap-4 border-b w-full md:w-auto">
                    <button onclick="filterIssues('all')" id="tab-all" class="tab-btn pb-2 border-b-2 border-blue-600 font-semibold">All</button>
                    <button onclick="filterIssues('open')" id="tab-open" class="tab-btn pb-2 border-transparent text-gray-500">Open</button>
                    <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn pb-2 border-transparent text-gray-500">Closed</button>
                </div>
                <div id="stats-area" class="text-sm font-medium flex gap-4">
                    <span class="flex items-center gap-1 text-green-600"><img src="Open-Status.png" class="w-4"> <span id="open-count">0</span> Open</span>
                    <span class="flex items-center gap-1 text-purple-600"><img src="Closed-Status.png" class="w-4"> <span id="closed-count">0</span> Closed</span>
                </div>
            </div>

            <div id="loading-spinner" class="hidden py-20 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            </div>
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4">
                </div>
        </main>
    </section>

    <div id="issue-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modal-content">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
